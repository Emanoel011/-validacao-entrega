<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar Entrega</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: #3b82f6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .logo-sub {
      font-size: 12px;
      color: #64748b;
    }

    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #2d3556; }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) { background: #2563eb; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { background: #1e3a5f; color: #4a6080; cursor: not-allowed; }

    /* Notificação */
    .toast {
      display: none;
      margin-top: 20px;
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .toast.success {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #052e16;
      border: 1px solid #166534;
      color: #4ade80;
    }

    .toast.error {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #1c0a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
    }

    .toast.warning {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #1c1500;
      border: 1px solid #78350f;
      color: #fbbf24;
    }

    .toast-icon {
      font-size: 20px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .toast-body { display: flex; flex-direction: column; gap: 2px; }
    .toast-title { font-weight: 700; font-size: 13px; letter-spacing: 0.3px; }
    .toast-msg { font-weight: 400; opacity: 0.85; }

    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 22px;
      text-align: center;
      font-size: 12px;
      color: #2d3556;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">🛵</div>
    <div>
      <div class="logo-text">Confirmar Entrega</div>
      <div class="logo-sub">Sistema Gerencial</div>
    </div>
  </div>

  <label for="num_pedido">Número do pedido</label>
  <input
    type="number"
    id="num_pedido"
    placeholder="Ex: 1042"
    inputmode="numeric"
    autocomplete="off"
  />

  <label for="codigo">Código informado pelo cliente</label>
  <input
    type="text"
    id="codigo"
    placeholder="Ex: AB12"
    autocomplete="off"
    style="text-transform: uppercase; letter-spacing: 3px; font-size: 18px; font-weight: 600;"
  />

  <button id="btn" onclick="confirmarEntrega()">
    Confirmar entrega
  </button>

  <div class="toast" id="toast">
    <div class="toast-icon" id="toast-icon"></div>
    <div class="toast-body">
      <div class="toast-title" id="toast-title"></div>
      <div class="toast-msg" id="toast-msg"></div>
    </div>
  </div>

  <div class="footer">Digite o número do pedido e o código<br>que o cliente te informou</div>

</div>

<script>
  const SUPABASE_URL = "https://oaxrdgmrzllyhjiskmfj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_DbRmua1Lzy9AFcAXBPYc6w_Nws3TnXm";

  const btn = document.getElementById("btn");
  const toast = document.getElementById("toast");

  function showToast(tipo, titulo, msg) {
    toast.className = "toast " + tipo;
    const icons = { success: "✓", error: "✕", warning: "!" };
    document.getElementById("toast-icon").textContent = icons[tipo] || "ℹ";
    document.getElementById("toast-title").textContent = titulo;
    document.getElementById("toast-msg").textContent = msg;
    toast.style.animation = "none";
    void toast.offsetWidth;
    toast.style.animation = "";
  }

  async function confirmarEntrega() {
    const numPedido = document.getElementById("num_pedido").value.trim();
    const codigo = document.getElementById("codigo").value.trim().toUpperCase();

    if (!numPedido || !codigo) {
      showToast("warning", "ATENÇÃO", "Preencha o número do pedido e o código.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verificando...';

    try {
      const busca = await fetch(
        `${SUPABASE_URL}/rest/v1/entregas?id=eq.${numPedido}&select=id,codigo_validacao,status`,
        {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            Accept: "application/json",
          },
        }
      );

      if (!busca.ok) {
        const errText = await busca.text();
        showToast("error", "ERRO DE CONEXÃO", `Falha ao consultar pedido. (${busca.status})`);
        console.error("Erro Supabase SELECT:", busca.status, errText);
        return;
      }

      const pedidos = await busca.json();

      if (!pedidos || pedidos.length === 0) {
        showToast("error", "NÃO ENCONTRADO", "Pedido não encontrado. Verifique o número.");
        return;
      }

      const pedido = pedidos[0];

      if (pedido.status === "Entregue") {
        showToast("warning", "JÁ CONFIRMADO", "Este pedido já foi confirmado anteriormente.");
        return;
      }

      if (pedido.codigo_validacao !== codigo) {
        showToast("error", "CÓDIGO INCORRETO", "Peça ao cliente para confirmar o código.");
        return;
      }

      const update = await fetch(
        `${SUPABASE_URL}/rest/v1/entregas?id=eq.${numPedido}`,
        {
          method: "PATCH",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json",
            Prefer: "return=minimal",
          },
          body: JSON.stringify({ status: "Entregue" }),
        }
      );

      if (!update.ok) {
        const errText = await update.text();
        showToast("error", "ERRO AO CONFIRMAR", `Não foi possível atualizar. (${update.status})`);
        console.error("Erro Supabase PATCH:", update.status, errText);
        return;
      }

      showToast("success", "ENTREGA CONFIRMADA", `Pedido #${numPedido} confirmado! O estabelecimento foi notificado.`);
      document.getElementById("num_pedido").value = "";
      document.getElementById("codigo").value = "";

    } catch (e) {
      showToast("error", "SEM CONEXÃO", "Verifique sua internet e tente novamente.");
      console.error("Erro de rede:", e);
    } finally {
      btn.disabled = false;
      btn.innerHTML = "Confirmar entrega";
    }
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") confirmarEntrega();
  });
</script>

</body>
</html>
